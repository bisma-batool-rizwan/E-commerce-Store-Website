<body>


<nav class="navbar">

<section class="product-detail">


<div class="product-image">

<img id="productImage"
src="https://images.unsplash.com/photo-1523275335684-37898b6baf30"
>

</div>



<div class="product-info">


<h1 id="productName">
Product Name
</h1>


<h2 id="productPrice">
$0
</h2>


<p>
Premium quality product with modern design.
Perfect choice for everyday use.
</p>



<div class="quantity">

<label>Quantity:</label>

<input 
type="number"
id="quantity"
value="1"
min="1"
>


</div>



<button onclick="addDetailToCart()">
Add To Cart 🛒
</button>


<button onclick="buyDetailProduct()">
Buy Now ⚡
</button>



</div>


</section>
