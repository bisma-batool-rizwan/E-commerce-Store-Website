<!DOCTYPE html>
<html>
<head>
<title>Signup - Nova Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="features">

<h1>Create Account</h1>

<form id="signupForm">

<input 
type="text" 
id="signupName"
placeholder="Full Name"
required>


<input 
type="email" 
id="signupEmail"
placeholder="Email"
required>


<input 
type="password" 
id="signupPassword"
placeholder="Password"
required>


<button type="submit">
Sign Up
</button>

</form>


<p>
Already have account?
<a href="login.html">Login</a>
</p>


</section>


<script src="auth.js"></script>

</body>
</html>
